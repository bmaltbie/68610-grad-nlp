name: decomposition tests

on:
  pull_request:
    paths:
      - "decomposition/**"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - "decomposition/**"
      - ".github/workflows/tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decomposition
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Run decomposition tests
        run: uv run pytest
